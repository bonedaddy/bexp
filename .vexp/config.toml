# Vexp Configuration
# Detected project type: rust

token_budget = 8000
default_skeleton_level = "standard"
max_file_size = 1000000
watcher_debounce_ms = 500
memory_budget_pct = 0.10
session_compress_after_hours = 2
observation_ttl_days = 90
db_path = ".vexp/index.db"

exclude_patterns = [
    "node_modules",
    ".git",
    "target",
    "dist",
    "build",
    "__pycache__",
    ".venv",
    "venv",
    ".next",
    ".nuxt",
    "vendor",
    ".vexp"
]
